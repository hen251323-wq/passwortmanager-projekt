<!DOCTYPE "html">
<html lang="en">
	<head>
		<meta charset="utf-8"/>
		<meta name="viewport" content="width-device-width, initial-scale-1.0"/>
		<title>Passwortmanager</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body class="roboto-font">
		<main>
			<div class="window left">
				<h1> Passwortmanager </h1>
				
				<form class="vertical-container">
					<input type="text" id="new_set_name" name="new_set_name", placeholder="Name">
					<input type="password" id="new_set_password" name="new_set_password" placeholder="Masterkennwort">
					<input type="button" id="new_set_submit" value="Neues Set erstellen">

					<p>oder</p>

					<input type="button" id="load_set_button" value="Set laden">
					<input type="button" id="save_set_button" value="Set speichern">
				</form>
			</div>
			<div class="window right">
				<header>
					<form class="vertical-container"> 
						<input type="text" id="set_password", name="set_password" placeholder="Masterkennwort">
						<input type="button" id="set_password_submit" value="Masterkennwort bestätigen">
						<p class="error-text"> Falsches Masterkennwort für Set </p>
					</form>
				</header>

				<div class="entry-container-header">
					<p> Set "test_set" - Alle Einträge </p>	
				</div>

				<div class="scrollable entry-container">
					<div class="entry-element">
						<div class="inline">
							<p class="label-text">Nutzername: </p>
							<p class="entry-text">test_name_0</p>
						</div> <br>

						<div class="inline">
							<p class="label-text">Kennwort: </p>
							<p class="entry-text">test_password_0</p>
						</div>

						<div class="horizontal-line"></div>
						<form>
							<input type="button" id="entry_edit" name="entry_edit" value="Eintrag bearbeiten">
							<input type="button" id="entry_delete" name="entry_delete" value="Eintrag löschen">
						</form>
					</div>

					<div class="entry-element">
						<div class="inline">
							<p class="label-text">Nutzername: </p>
							<p class="entry-text">test_name_1</p>
						</div> <br>

						<div class="inline">
							<p class="label-text">Kennwort: </p>
							<p class="entry-text">test_password_1</p>
						</div>

						<div class="horizontal-line"></div>
						<form>
							<input type="button" id="entry_edit" name="entry_edit" value="Eintrag bearbeiten">
							<input type="button" id="entry_delete" name="entry_delete" value="Eintrag löschen">
						</form>
					</div>

					<form class="entry-element">
						<div class="inline">
							<input type="text" id="entry_name" name="entry_name" placeholder="Nutzername">
						</div> <br>

						<div class="inline">
							<input type="text" id="entry_name" name="entry_name" placeholder="Kennwort">
						</div>

						<div class="horizontal-line"></div>
						
						<div>
							<input type="button" id="entry_edit" name="entry_save" value="Eintrag speichern">
						</div>
					</form>
				</div>

				<form class="entry-container-footer">
					<input type="button" id="new_entry_add" name="new_entry_add" value="Neuen Eintrag hinzufügen">
				</form>
			</div>
		</main>
	</body>
</html>
